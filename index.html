<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мой сайт</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


<!-- БЛОК 1: стартовый экран -->

<section class="start-screen" id="startScreen">
  <img class="start-screen-img" src="img/1.png" alt="">

  <button class="start-screen-btn" id="openSiteBtn" type="button">
    <img src="img/2.png" alt="">
  </button>
</section>

<audio id="bgMusic" loop>
  <source src="butyrka-a-dlja-vas-ja-nikto_3v2yPhNm.mp3" type="audio/mpeg">
</audio>

<div class="site-content" id="siteContent">

<!-- БЛОК 2 -->

<section class="block2">

  <img class="block2-top" src="img/3.png" alt="">

  <div class="block2-bottom-wrap">
    <img class="block2-img" src="img/4.png" alt="">

    <div class="block2-text">
      <span class="line line1">Слепнев</span>
      <span class="line line2">Дмитрий</span>
      <span class="line line3">Николаевич</span>
    </div>
  </div>

</section>

  <!-- БЛОК 3 -->

<section class="block3">

  <div class="block3-top-wrap">
    <img class="block3-img" src="img/5.png" alt="">

    <div class="block3-text">
      <span class="line line1">Алексеева</span>
      <span class="line line2">Анастасия</span>
      <span class="line line3">Алексеевна</span>
    </div>
  </div>

  <img class="block3-bottom" src="img/6.png" alt="">

</section>

<!-- БЛОК 4 -->

<section class="block4">

  <div class="block4-top-wrap">
    <img class="block4-img" src="img/7.png" alt="">

    <div class="block4-text">
      <span class="block4-line block4-line1">21</span>
      <span class="block4-line block4-line2">августа</span>
    </div>
  </div>

  <img class="block4-bottom" src="img/8.png" alt="">

</section>

<!-- БЛОК 5 -->

<section class="block5">

  <div class="block5-wrap">
    <img class="block5-img" src="img/9.png" alt="">

    <div class="block5-text">
      <span class="block5-line">Банкетный зал: «White Hall»</span>
    </div>
  </div>

</section>

<!-- БЛОК 6 -->

<section class="block6">

  <img class="block6-img" src="img/10.png" alt="">

  <img class="block6-bottom" src="img/11.png" alt="">

</section>

<!-- БЛОК 7 -->

<section class="block7">

  <img class="block7-img" src="img/12.png" alt="">

  <img class="block7-bottom" src="img/13.png" alt="">

</section>

<!-- БЛОК 8 -->

<section class="block8">

  <img class="block8-img" src="img/14.png" alt="">

  <div class="block8-row">
    <img class="block8-left" src="img/15.png" alt="">
    <img class="block8-right" src="img/16.png" alt="">
  </div>

  <img class="block8-bottom" src="img/17.png" alt="">

</section>

<!-- БЛОК 9 -->

<section class="block9">
  <img class="block9-img" src="img/18.png" alt="">
</section>

<!-- БЛОК 10 -->

<section class="block10">

  <div class="block10-top-wrap">
    <img class="block10-img" src="img/19.png" alt="">

    <div class="block10-text">
      <span class="block10-line block10-line1">25</span>
      <span class="block10-line block10-line2">июня</span>
    </div>
  </div>

  <form id="block10Form" class="block10-form">

    <input class="block10-input" type="text" name="fio" placeholder="Введите ваше ФИО" required>

    <div class="block10-check-wrap">
      <label class="block10-check-row">
        <input class="block10-checkbox" type="checkbox" name="agree">
        <img class="block10-check-img" src="img/20.png" alt="">
      </label>
    </div>

    <button class="block10-submit" type="submit">
      <img class="block10-submit-img" src="img/21.png" alt="">
    </button>

  </form>

</section>

<!-- БЛОК 11 -->

<section class="block11">

  <img class="block11-img" src="img/22.png" alt="">

  <div class="block11-stage">
    <img class="block11-photo23" src="img/23.png" alt="">
    <img class="block11-photo24" src="img/24.png" alt="">
  </div>

  <img class="block11-photo25" src="img/25.png" alt="">

</section>

</div>

  <script src="script.js"></script>
</body>
</html>
